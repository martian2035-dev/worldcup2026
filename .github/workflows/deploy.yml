name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Every 2 hours during tournament (Jun 12 - Jul 19)
    - cron: '0 */2 * 6-7 *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    # Only run data fetch on schedule or manual trigger, not on push
    if: github.event_name != 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm run fetch-data || echo "Fetch skipped (no sources configured)"

      - name: Check for data changes
        id: diff
        run: |
          git diff --quiet -- src/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git commit -m "chore: auto-update match data [skip ci]"
          git push

  build-and-deploy:
    needs: [fetch-data]
    if: |
      always() &&
      (needs.fetch-data.result == 'success' || needs.fetch-data.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - id: deployment
        uses: actions/deploy-pages@v4
