name: Deploy

on:
  push:
    branches: [main]
  schedule:
    # 比赛期间 (6/12-7/19): 每 2 小时更新
    - cron: '7 */2 12-30 6 *'
    - cron: '7 */2 1-19 7 *'
    # 非比赛期间: 每 12 小时检查
    - cron: '7 */12 1-11 6 *'
    - cron: '7 */12 20-31 7 *'
  workflow_dispatch:
    inputs:
      fetch-data:
        description: '从 FIFA 抓取最新数据'
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 数据抓取（定时任务或手动触发）
      - name: Fetch latest data from FIFA
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.fetch-data == 'true')
        env:
          FIFA_SEASON_ID: ${{ secrets.FIFA_SEASON_ID || '' }}
        run: pnpm run fetch-data || echo "⚠️ Data fetch skipped (API not available)"

      # 赔率更新（基于 FIFA 排名，配置 ODDS_API_KEY 后可获取真实赔率）
      - name: Update match odds
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY || '' }}
        run: npx tsx scripts/fetch-odds.ts || echo "⚠️ Odds update failed"

      # 提交数据变更
      - name: Commit data updates
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet -- src/data/ public/odds.json || (git add src/data/ public/odds.json && git commit -m "chore: auto-update match data and odds" && git push)

      - run: pnpm run build
        env:
          PREDICTION_API_BASE: ${{ vars.PREDICTION_API_BASE || '' }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - id: deployment
        uses: actions/deploy-pages@v4
