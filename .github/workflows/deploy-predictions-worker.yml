name: Deploy predictions worker

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          secrets: |
            GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.PREDICTIONS_GITHUB_TOKEN }}
          NPM_CONFIG_LEGACY_PEER_DEPS: "true"

      - name: Rebuild Pages with Worker URL
        if: steps.deploy.outputs.deployment-url != ''
        run: gh workflow run deploy.yml -f fetch-data=false
        env:
          GH_TOKEN: ${{ github.token }}
