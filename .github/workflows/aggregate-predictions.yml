name: Aggregate predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch prediction submissions
        run: |
          mkdir -p tmp/prediction-submissions
          if git ls-remote --exit-code --heads origin prediction-submissions; then
            git fetch origin prediction-submissions:prediction-submissions
            git --work-tree=tmp/prediction-submissions checkout prediction-submissions -- events || true
          else
            echo "No prediction-submissions branch yet."
          fi

      - name: Test
        run: pnpm test

      - name: Aggregate predictions
        run: pnpm run aggregate:predictions

      - name: Commit prediction data
        run: |
          if git diff --quiet -- src/data/bets src/data/predictions; then
            echo "No prediction data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/bets src/data/predictions
          git commit -m "chore: aggregate predictions"
          git push
